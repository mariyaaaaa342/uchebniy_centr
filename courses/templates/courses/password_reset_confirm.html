{% extends 'courses/base.html' %}
{% load static %}

{% block title %}Новый пароль{% endblock %}

{% block extra_css %}
<style>
    .reset-container {
        max-width: 500px;
        margin: 100px auto;
        padding: 40px;
        background: white;
        border-radius: 40px;
        box-shadow: 0 15px 30px rgba(63, 87, 91, 0.1);
        border: 1px solid var(--color-2);
    }
    
    .reset-title {
        font-family: var(--font-main);
        font-size: 2rem;
        font-weight: 300;
        color: var(--color-4);
        text-align: center;
        margin-bottom: 30px;
    }
    
    .reset-btn {
        width: 100%;
        padding: 12px;
        background: var(--color-1);
        color: white;
        border: none;
        border-radius: 30px;
        font-family: var(--font-main);
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        margin-top: 10px;
    }
    
    .reset-btn:hover {
        background: var(--color-4);
    }
</style>
{% endblock %}

{% block content %}
<div class="reset-container">
    <h1 class="reset-title">Новый пароль</h1>
    
    {% if messages %}
        {% for message in messages %}
            <div class="{% if message.tags == 'error' %}error-message{% else %}success-message{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
    
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Новый пароль</label>
            <input type="password" name="password" class="form-input" required>
        </div>
        <div class="form-group">
            <label class="form-label">Подтверждение пароля</label>
            <input type="password" name="password_confirm" class="form-input" required>
        </div>
        <button type="submit" class="reset-btn">Сохранить пароль</button>
    </form>
</div>
{% endblock %}
