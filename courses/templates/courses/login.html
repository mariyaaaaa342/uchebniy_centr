{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Учебный центр Ledy</title>
    <link href="https://fonts.googleapis.com/css?family=Advent+Pro:100,200,300,400,500,600,700,800,900" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'courses/css/styles.css' %}">
    <link rel="stylesheet" href="{% static 'courses/css/header.css' %}">
    <link rel="stylesheet" href="{% static 'courses/css/login.css' %}">
    <link rel="stylesheet" href="{% static 'courses/css/footer.css' %}">

</head>
<body>
    {% include 'courses/header.html' %}
    
    <div class="login-container">
        <h1 class="login-title">Вход</h1>
        
        {% if messages %}
            {% for message in messages %}
                <div class="{% if message.tags == 'error' %}error-message{% else %}success-message{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label">Телефон или Email</label>
                <input type="text" name="login_input" class="form-input" required placeholder="+7 (___) _______ или email@example.com">
            </div>
            
            <div class="form-group">
                <label class="form-label">Пароль</label>
                <input type="password" name="password" class="form-input" required placeholder="Введите пароль">
            </div>
            
            <button type="submit" class="login-btn">Войти</button>
        </form>
        
        <div class="register-link">
            Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
        </div>
    </div>
    
    {% include 'courses/footer.html' %}
    <script src="{% static 'courses/js/menu.js' %}"></script>
</body>
</html>
