{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Учебный центр Ledy</title>
    <link href="https://fonts.googleapis.com/css?family=Advent+Pro:100,200,300,400,500,600,700,800,900" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'courses/css/styles.css' %}">
    <link rel="stylesheet" href="{% static 'courses/css/header.css' %}">
    <link rel="stylesheet" href="{% static 'courses/css/register.css' %}">
    <link rel="stylesheet" href="{% static 'courses/css/footer.css' %}">
</head>
<body>
    {% include 'courses/header.html' %}
    
    <div class="register-container">
        <h1 class="register-title">Регистрация</h1>
        
        {% if messages %}
            {% for message in messages %}
                <div class="{% if message.tags == 'error' %}error-message{% else %}success-message{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label">ФИО</label>
                <input type="text" name="full_name" class="form-input" required placeholder="Введите ФИО">
            </div>
            
            <div class="form-group">
                <label class="form-label">Номер телефона</label>
                <input type="tel" name="phone" class="form-input" required placeholder="+7 (___)______">
            </div>
            
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-input" required placeholder="anna@example.com">
            </div>
            
            <div class="form-group">
                <label class="form-label">Пароль</label>
                <input type="password" name="password" class="form-input" required placeholder="Минимум 6 символов">
            </div>
            
            <div class="form-group">
                <label class="form-label">Подтверждение пароля</label>
                <input type="password" name="password_confirm" class="form-input" required placeholder="Повторите пароль">
            </div>
            
            <button type="submit" class="register-btn">Зарегистрироваться</button>
        </form>
        
        <div class="login-link">
            Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a> 
        </div>
    </div>
    
    {% include 'courses/footer.html' %}
    <script src="{% static 'courses/js/menu.js' %}"></script>
</body>
</html>
